spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

server:
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: Strict

logging:
  level:
    root: warn
    com.pos: info
