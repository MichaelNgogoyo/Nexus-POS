spring:
  application:
    name: pos

  profiles:
    active: dev
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:postgresql://localhost:5432/pos_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resource server:
        jwt:
          issuer-uri: https://pos.mobitechsolutions.co.ke/realms/pos
      client:
        registration:
          pos-client:
            client-id: pos-client
            client-secret: password
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: https://pos.mobitechsolutions.co.ke/*
            client-name: pos-client

        provider:
          pos-keycloak:
            issuer-uri: https://pos.mobitechsolutions.co.ke/realms/pos
            authorization-uri: https://pos.mobitechsolutions.co.ke/realms/pos/protocol/openid-connect/auth
            token-uri: https://pos.mobitechsolutions.co.ke/realms/pos/protocol/openid-connect/token
            user-info-uri: https://pos.mobitechsolutions.co.ke/realms/pos/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: None

logging:
  level:
    root: info