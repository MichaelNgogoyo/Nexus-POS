spring:
  application:
    name: pos

  profiles:
    active: dev
  thymeleaf:
    cache: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pos_db}
    username: ${DB_USERNAME:pos_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
      client:
        registration:
          pos-client:
            client-id: ${KEYCLOAK_CLIENT_ID:pos-client}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: ${KEYCLOAK_REDIRECT_URI}
            client-name: pos-client

        provider:
          pos-keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}
            authorization-uri: ${KEYCLOAK_ISSUER_URI}/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_ISSUER_URI}/protocol/openid-connect/token
            user-info-uri: ${KEYCLOAK_ISSUER_URI}/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:product-images}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# POS business rules
pos:
  tax-rate: ${POS_TAX_RATE:0}   # Tax percentage, e.g. 16 for 16% VAT. 0 = no tax.

server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: None

logging:
  level:
    root: info
