spring:
  application:
    name: pos

  config:
    # Optional local developer overrides from project root (gitignored)
    import: optional:file:./application-dev-local.yml

  thymeleaf:
    cache: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pos_db}
    username: ${DB_USERNAME:pos_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/pos}
      client:
        registration:
          pos-client:
            client-id: ${KEYCLOAK_CLIENT_ID:pos-client}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:5173/*}
            client-name: pos

        provider:
          pos-keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/pos}
            authorization-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/pos}/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/pos}/protocol/openid-connect/token
            user-info-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/pos}/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:product-images}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  servlet:
    session:
      cookie:
        secure: false
        http-only: true
        same-site: Lax

logging:
  level:
    root: warn
    com.pos: debug
    org.springframework.web: info
    org.springframework.security: warn
    org.hibernate.SQL: debug
