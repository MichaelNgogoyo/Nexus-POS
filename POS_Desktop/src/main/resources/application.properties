# Remote API endpoints (aligned to backend dev profile)
app.api.baseUrl=http://localhost:8080/api
app.api.healthUrl=http://localhost:8080/actuator/health

# Local persistence
app.local.db=./data/pos-desktop.db

# Sync behavior
app.sync.interval.seconds=30
app.sync.batchSize=100

# UI labels
app.product.title=Products
app.inventory.title=Inventory
app.sales.title=Sales
app.reports.title=Reports
app.users.title=Users

# Keycloak (dev)
keycloak.issuer=http://localhost:8081/realms/pos
keycloak.tokenEndpoint=http://localhost:8081/realms/pos/protocol/openid-connect/token
keycloak.userinfoEndpoint=http://localhost:8081/realms/pos/protocol/openid-connect/userinfo
keycloak.clientId=poskeycloakid
# Leave blank if using a public client; set if confidential
keycloak.clientSecret=password
