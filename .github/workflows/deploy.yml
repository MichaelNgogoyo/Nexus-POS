name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      target_service:
        description: "Deploy only frontend, backend, or all services"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - backend
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  # GitHub Actions secrets to add in the repository:
  # Settings -> Secrets and variables -> Actions
  VPS_HOST: ${{ secrets.VPS_HOST }} # Example: 31.97.116.56
  VPS_USER: ${{ secrets.VPS_USER }} # Example: michael
  VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }} # Contents of ~/.ssh/id_ed25519 (private key)
  VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }} # Optional fallback when password-based SSH is enabled
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }} # Falls back to the repo owner when no dedicated GHCR username secret is set
  GHCR_PAT: ${{ secrets.GHCR_PAT }} # GitHub PAT with write:packages permission and repo read access for private repos
  APP_DOMAIN: ${{ secrets.APP_DOMAIN }} # Example: nexuspos.apperstar.dev
  IMAGE_NAME_FRONTEND: pos-frontend
  IMAGE_NAME_BACKEND: pos-backend
  TARGET_SERVICE: ${{ github.event.inputs.target_service || 'all' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required deployment secrets
        run: |
          if [ -z "${{ secrets.GHCR_PAT }}" ]; then
            echo "GHCR_PAT is missing. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Using GHCR username: ${{ env.GHCR_USERNAME }}"
          echo "Tip: create a PAT with 'write:packages' and 'read:packages' scopes, and ensure it has access to this repository."
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST is missing. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "VPS_USER is missing. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ]; then
            echo "VPS_SSH_PRIVATE_KEY is missing. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_PAT }}

      - name: Build and push frontend image
        if: ${{ env.TARGET_SERVICE == 'all' || env.TARGET_SERVICE == 'frontend' }}
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }} -f docker/Dockerfile.frontend .
          docker push ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}

      - name: Build and push backend image
        if: ${{ env.TARGET_SERVICE == 'all' || env.TARGET_SERVICE == 'backend' }}
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }} -f docker/Dockerfile.backend .
          docker push ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}

      - name: Verify SSH access to VPS
        shell: bash
        env:
          VPS_HOST: ${{ env.VPS_HOST }}
          VPS_USER: ${{ env.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ env.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          cat > /tmp/vps_key <<'EOF'
          ${{ env.VPS_SSH_PRIVATE_KEY }}
          EOF

          chmod 600 /tmp/vps_key

          if ! ssh-keygen -y -f /tmp/vps_key >/tmp/vps_key.pub 2>/dev/null; then
            echo "The provided VPS_SSH_PRIVATE_KEY is not a valid private key."
            exit 1
          fi

          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          if ! ssh -i /tmp/vps_key -o BatchMode=yes -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "echo SSH_OK"; then
            echo "SSH authentication failed. Add the following public key to /home/${VPS_USER}/.ssh/authorized_keys on the VPS:"
            cat /tmp/vps_key.pub
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            mkdir -p /opt/pos
            cd /opt/pos

            echo "${{ env.GHCR_PAT }}" | docker login ghcr.io -u "${{ env.GHCR_USERNAME }}" --password-stdin

            OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            export APP_DOMAIN="${{ env.APP_DOMAIN }}"
            export DB_URL="${{ secrets.DB_URL || 'jdbc:postgresql://postgres:5432/pos_db' }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME || 'pos_user' }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD || 'CHANGE_ME_IN_PRODUCTION' }}"
            export KEYCLOAK_ISSUER_URI="${{ secrets.KEYCLOAK_ISSUER_URI || 'https://nexuspos.apperstar.dev/auth/realms/master' }}"
            export KEYCLOAK_CLIENT_ID="${{ secrets.KEYCLOAK_CLIENT_ID || 'pos-client' }}"
            export KEYCLOAK_CLIENT_SECRET="${{ secrets.KEYCLOAK_CLIENT_SECRET || 'CHANGE_ME_FROM_KEYCLOAK_ADMIN' }}"
            export KEYCLOAK_REDIRECT_URI="${{ secrets.KEYCLOAK_REDIRECT_URI || 'https://nexuspos.apperstar.dev/api/callback' }}"
            export MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT || 'http://minio:9000' }}"
            export MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY || 'minioadmin' }}"
            export MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY || 'CHANGE_ME_IN_PRODUCTION' }}"
            export MINIO_BUCKET="${{ secrets.MINIO_BUCKET || 'product-images' }}"
            export CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS || 'https://nexuspos.apperstar.dev' }}"
            export FRONTEND_PORT=$(python3 - <<'PY'
            import socket
            for start in (3000, 3001, 3002, 3100, 3200, 4000):
                s = socket.socket()
                try:
                    s.bind(("127.0.0.1", start))
                    print(start)
                    break
                except OSError:
                    continue
                finally:
                    s.close()
            else:
                print(3000)
            PY
            )
            export BACKEND_PORT=$(python3 - <<'PY'
            import socket
            for start in (8081, 8082, 8083, 9000, 10000):
                s = socket.socket()
                try:
                    s.bind(("127.0.0.1", start))
                    print(start)
                    break
                except OSError:
                    continue
                finally:
                    s.close()
            else:
                print(8081)
            PY
            )

            cat > docker-compose.yml <<YAML
            services:
              postgres:
                image: postgres:16-alpine
                environment:
                  POSTGRES_DB: pos_db
                  POSTGRES_USER: ${DB_USERNAME}
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - postgres-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d pos_db"]
                  interval: 10s
                  timeout: 5s
                  retries: 10
                restart: always

              backend:
                image: ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
                depends_on:
                  postgres:
                    condition: service_healthy
                ports:
                  - "127.0.0.1:${BACKEND_PORT}:8080"
                environment:
                  SPRING_PROFILES_ACTIVE: "prod"
                  SERVER_PORT: "8080"
                  DB_URL: "${DB_URL}"
                  DB_USERNAME: "${DB_USERNAME}"
                  DB_PASSWORD: "${DB_PASSWORD}"
                  KEYCLOAK_ISSUER_URI: "${KEYCLOAK_ISSUER_URI}"
                  KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID}"
                  KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET}"
                  KEYCLOAK_REDIRECT_URI: "${KEYCLOAK_REDIRECT_URI}"
                  MINIO_ENDPOINT: "${MINIO_ENDPOINT}"
                  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
                  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
                  MINIO_BUCKET: "${MINIO_BUCKET}"
                  CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
                restart: always

              frontend:
                image: ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
                ports:
                  - "127.0.0.1:${FRONTEND_PORT}:80"
                volumes:
                  - ./frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
                restart: always

            volumes:
              postgres-data:
            YAML

            cat > frontend-nginx.conf <<EOF
            server {
              listen 80;
              server_name _;
              client_max_body_size 20m;

              location /api/ {
                proxy_pass http://backend:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }

              location /auth/ {
                proxy_pass http://backend:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }

              location / {
                root /usr/share/nginx/html;
                index index.html;
                try_files $uri $uri/ /index.html;
              }
            }
            EOF

            docker compose down --remove-orphans || true

            if [ "${{ env.TARGET_SERVICE }}" = "frontend" ]; then
              docker compose pull frontend
              docker compose up -d --remove-orphans frontend
            elif [ "${{ env.TARGET_SERVICE }}" = "backend" ]; then
              docker compose pull backend
              docker compose up -d --remove-orphans backend
            else
              docker compose pull
              docker compose up -d --remove-orphans
            fi
            docker ps
 